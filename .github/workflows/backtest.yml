name: XAUUSD Backtest

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: "Start date"
        required: true
        default: "2026-05-01"
      to_date:
        description: "End date"
        required: true
        default: "2026-05-29"

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Get repo files
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install basic packages
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas numpy scipy pydantic structlog loguru ta requests aiohttp websockets python-dotenv pytest

      - name: Run backtest
        run: |
          python scripts/run_ict_smc_backtest.py \
            --source csv \
            --symbol XAUUSD \
            --from "${{ github.event.inputs.from_date }}" \
            --to "${{ github.event.inputs.to_date }}" \
            --csv-1m data/xauusd_m1.csv \
            --spread-price 0.40 \
            --slippage-price 0.10

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: backtest_outputs
          path: backtest_outputs/
