name: Continuous Integration Testing Pipeline

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]

jobs:
  run_test_matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Architecture Core Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Pytest Suite with Coverage Verification
        run: |
          pytest --cov=src --cov-report=xml tests/

      - name: Upload Telemetry Logs Archive
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-report
          path: coverage.xml